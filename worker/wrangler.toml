# Variables NO secretas.
[vars]
FIRESTORE_DB = "swgohapi"
ALLY_CODE    = "355463284"
GUILD_ID     = "U6tWH0WuSDyl_g7lmgZm-w"
ADMIN_ALLY   = "355463284"    # ally del admin del gremio (rol admin al registrarse; Fase 5.1)
